<!DOCTYPE HTML>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
    <h1>Pokedéx</h1>
    <input type="text" id="searchInput" placeholder="Buscar Pokémon">
</header>

<main>
    <div id="pokemonList" class="pokemon-list"></div>
</main>

<div id="sidePanel" class="side-panel hidden">
    <button id="closePanel">X</button>
    
  <img id="panelImage" />
  <h2 id="panelName"></h2>
  <p id="panelNumber"></p>
  <p id="panelType"></p>
  <button id="favoriteBtn">⭐ Favoritar</button>
</div>

<div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Carregando Pokémons</p>
</div>

<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span id="closeModal">&times;</span>
        <h2 id="modalName"></h2>
        <img id="modalImage">
        <p id="modalNumber"></p>
        <p id="modalType"></p>
    </div>
</div>
<button id="changeBoxBtn">Trocar Box</button>
<script type="module" src="js/main.js"></script>
<footer>
  <p>© 2026 Pokédex do Cairoba • Feito com JavaScript</p>
</footer>
</body>
</html>
